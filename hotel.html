<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LuxeStay OS | Property Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        /* Status Colors */
        .status-occupied { color: #ff4d4d; border-left: 3px solid #ff4d4d; background: rgba(255, 77, 77, 0.05); }
        .status-available { color: #00ff88; border-left: 3px solid #00ff88; background: rgba(0, 255, 136, 0.05); }
        .status-cleaning { color: #ffcc00; border-left: 3px solid #ffcc00; background: rgba(255, 204, 0, 0.05); }
        
        .btn-action { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .btn-action:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6 pb-20">

    <div class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white">LuxeStay<span class="text-blue-500 italic">OS</span></h1>
            <p class="text-[9px] uppercase tracking-[0.4em] text-slate-500 font-bold">Independent Global Property Suite</p>
        </div>
        <div class="text-right">
            <p id="live-clock" class="text-[10px] font-black text-blue-500"></p>
            <p class="text-[8px] text-slate-600 uppercase font-bold tracking-widest">System Online</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-10">
        <div class="glass p-6 rounded-[32px]">
            <p class="text-[10px] text-slate-500 uppercase font-black mb-1 tracking-wider">Occupancy</p>
            <p class="text-3xl font-black text-white" id="occ-rate">0%</p>
        </div>
        <div class="glass p-6 rounded-[32px]">
            <p class="text-[10px] text-slate-500 uppercase font-black mb-1 tracking-wider">Est. Revenue</p>
            <p class="text-3xl font-black text-white" id="total-rev">€0</p>
        </div>
    </div>

    <div class="flex justify-between items-center mb-6 px-2">
        <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-slate-400">Floor Inventory</h3>
        <div class="h-[1px] flex-grow mx-4 bg-white/5"></div>
        <span class="text-[10px] font-bold text-blue-500">Maribor Hub</span>
    </div>

    <div id="room-grid" class="space-y-4">
        </div>

    <script>
        const roomPrice = 145; // Premium nightly rate
        let rooms = [
            { id: 101, type: 'Executive Suite', status: 'occupied', guest: 'Aamir S.' },
            { id: 102, type: 'King Deluxe', status: 'available', guest: '-' },
            { id: 103, type: 'Single Loft', status: 'cleaning', guest: '-' },
            { id: 104, type: 'Executive Suite', status: 'available', guest: '-' },
            { id: 105, type: 'Double Studio', status: 'occupied', guest: 'Guest #882' }
        ];

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        function render() {
            const grid = document.getElementById('room-grid');
            let occupiedCount = 0;
            
            grid.innerHTML = rooms.map(room => {
                if(room.status === 'occupied') occupiedCount++;
                return `
                <div onclick="showActions(${room.id})" class="glass p-5 rounded-[28px] flex justify-between items-center btn-action status-${room.status} text-left">
                    <div>
                        <div class="flex items-center gap-3">
                            <span class="text-xl font-black text-white">${room.id}</span>
                            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${room.type}</span>
                        </div>
                        <p class="text-sm font-semibold mt-1 ${room.status === 'occupied' ? 'text-white' : 'text-slate-600'}">${room.guest}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-black uppercase">${room.status}</p>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('occ-rate').innerText = Math.round((occupiedCount / rooms.length) * 100) + "%";
            document.getElementById('total-rev').innerText = "€" + (occupiedCount * roomPrice);
        }

        function showActions(id) {
            const room = rooms.find(r => r.id === id);
            
            if (room.status === 'available') {
                const name = prompt(`Enter Guest Name for Room ${id}:`);
                if (name) { room.guest = name; room.status = 'occupied'; }
            } 
            else if (room.status === 'occupied') {
                if (confirm(`Check-out Room ${id}? (Will set to Cleaning)`)) {
                    room.guest = '-';
                    room.status = 'cleaning';
                }
            } 
            else if (room.status === 'cleaning') {
                if (confirm(`Is Room ${id} ready for new guests?`)) {
                    room.status = 'available';
                }
            }
            render();
        }

        render();
    </script>
</body>
</html>
