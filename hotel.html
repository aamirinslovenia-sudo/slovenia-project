<script>
    // Advanced Data Structure
    const roomTypes = {
        'Executive Suite': 250,
        'King Deluxe': 180,
        'Single Loft': 110,
        'Double Studio': 145
    };

    let rooms = [
        { id: 101, type: 'Executive Suite', status: 'occupied', guest: 'Aamir S.', nights: 3, checkInDate: '2026-03-20' },
        { id: 102, type: 'King Deluxe', status: 'available', guest: '-', nights: 0 },
        { id: 103, type: 'Single Loft', status: 'cleaning', guest: '-', nights: 0 },
        { id: 104, type: 'Executive Suite', status: 'available', guest: '-', nights: 0 },
        { id: 105, type: 'Double Studio', status: 'occupied', guest: 'Guest #882', nights: 1, checkInDate: '2026-03-22' }
    ];

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }
    setInterval(updateClock, 1000);

    function render() {
        const grid = document.getElementById('room-grid');
        let occupiedCount = 0;
        let totalRevenue = 0;
        
        grid.innerHTML = rooms.map(room => {
            const rate = roomTypes[room.type];
            const roomTotal = room.nights * rate;
            if(room.status === 'occupied') {
                occupiedCount++;
                totalRevenue += roomTotal;
            }

            return `
            <div onclick="showActions(${room.id})" class="glass p-5 rounded-[28px] flex justify-between items-center btn-action status-${room.status} text-left">
                <div>
                    <div class="flex items-center gap-3">
                        <span class="text-xl font-black text-white">${room.id}</span>
                        <span class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">${room.type}</span>
                    </div>
                    <div class="mt-1">
                        <p class="text-sm font-semibold ${room.status === 'occupied' ? 'text-white' : 'text-slate-600'}">
                            ${room.guest} ${room.nights > 0 ? `• ${room.nights} Nights` : ''}
                        </p>
                        ${room.status === 'occupied' ? `<p class="text-[9px] text-slate-400 font-bold uppercase mt-1">Balance: €${roomTotal}</p>` : ''}
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-black uppercase">${room.status}</p>
                    <p class="text-[9px] text-slate-500 font-bold italic mt-1">€${rate}/n</p>
                </div>
            </div>`;
        }).join('');

        document.getElementById('occ-rate').innerText = Math.round((occupiedCount / rooms.length) * 100) + "%";
        document.getElementById('total-rev').innerText = "€" + totalRevenue;
    }

    function showActions(id) {
        const room = rooms.find(r => r.id === id);
        
        if (room.status === 'available') {
            const name = prompt(`Guest Name for Room ${id}:`);
            if (name) {
                const stay = prompt(`Duration of stay (Nights):`, "1");
                room.guest = name;
                room.nights = parseInt(stay) || 1;
                room.status = 'occupied';
            }
        } 
        else if (room.status === 'occupied') {
            const rate = roomTypes[room.type];
            const total = room.nights * rate;
            if (confirm(`GUEST FOLIO - Room ${id}\n-------------------\nGuest: ${room.guest}\nStay: ${room.nights} nights\nTotal Due: €${total}\n\nProceed with Check-out?`)) {
                room.guest = '-';
                room.nights = 0;
                room.status = 'cleaning';
            }
        } 
        else if (room.status === 'cleaning') {
            if (confirm(`Room ${id} has been sanitized and inspected?`)) {
                room.status = 'available';
            }
        }
        render();
    }

    render();
    updateClock();
</script>
