// Add this inside a <script> tag before </body>
let rooms = [
    { id: 101, type: 'Deluxe Suite', status: 'occupied', guest: 'Janez Novak' },
    { id: 102, type: 'Standard King', status: 'available', guest: '-' },
    { id: 103, type: 'Single Room', status: 'cleaning', guest: '-' }
];

function renderRooms() {
    const grid = document.getElementById('room-grid');
    grid.innerHTML = rooms.map(room => `
        <div onclick="manageRoom(${room.id})" class="glass p-5 rounded-[30px] cursor-pointer hover:border-blue-500/50 transition-all">
            <p class="text-2xl font-black mb-1">${room.id}</p>
            <p class="text-[10px] text-slate-500 font-bold uppercase mb-4">${room.type}</p>
            <span class="status-${room.status} px-3 py-1 rounded-full text-[9px] font-black uppercase">${room.status}</span>
            <div class="mt-6 border-t border-white/5 pt-4">
                <p class="text-[9px] text-slate-500 uppercase font-bold text-left">Guest</p>
                <p class="text-xs font-semibold text-left">${room.guest}</p>
            </div>
        </div>
    `).join('');
}

function manageRoom(roomId) {
    const room = rooms.find(r => r.id === roomId);
    const newGuest = prompt(`Check-in Guest for Room ${roomId}:`, room.guest);
    if (newGuest !== null) {
        room.guest = newGuest;
        room.status = (newGuest.trim() === '-' || newGuest.trim() === '') ? 'available' : 'occupied';
        renderRooms();
    }
}

// Call this when the page loads
renderRooms();
