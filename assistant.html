<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice AI Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; overflow: hidden; }
        .neon-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
            filter: blur(20px); animation: breathe 3s infinite ease-in-out;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } }
        .glass-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex flex-col items-center justify-between h-screen p-8">

    <header class="text-center">
        <h1 style="font-family: 'Syncopate';" class="text-xs tracking-[0.5em] text-blue-500 mb-2">AAMIR AI SYSTEM</h1>
        <div class="h-[1px] w-12 bg-blue-500 mx-auto"></div>
    </header>

    <div class="relative flex items-center justify-center">
        <div class="neon-circle absolute"></div>
        <button onclick="startListening()" class="relative z-10 w-32 h-32 rounded-full border border-white/20 flex items-center justify-center bg-black active:scale-90 transition-all">
            <span id="mic-icon" class="text-4xl">🎙️</span>
        </button>
    </div>

    <div class="w-full space-y-4">
        <p id="transcript" class="text-center text-sm text-slate-400 italic min-h-[1.5rem]">"Tap mic to translate to Slovenian"</p>
        
        <button onclick="sendSOS()" class="w-full py-5 rounded-3xl bg-red-600/20 border border-red-500/50 text-red-500 font-bold tracking-widest uppercase text-xs active:bg-red-600 active:text-white transition-all">
            🚨 Emergency SOS
        </button>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="speak('Dober dan, kako ste?')" class="glass-btn py-4 rounded-2xl text-[10px] font-bold uppercase">Say "Hello"</button>
            <button onclick="speak('Kje je avtobusna postaja?')" class="glass-btn py-4 rounded-2xl text-[10px] font-bold uppercase">Ask "Bus Stop"</button>
        </div>
    </div>

    <footer class="text-[8px] text-slate-600 uppercase tracking-widest pb-4">
        Neural Link Active • Slovenia Hub
    </footer>

    <script>
        // Voice Output (Phone speaks Slovenian)
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'sl-SI'; // Slovenian language code
            window.speechSynthesis.speak(utterance);
        }

        // Voice Input (Phone listens to you)
        function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Speech recognition not supported on this browser.");
                return;
            }

            const recognition = new SpeechRecognition();
            document.getElementById('mic-icon').innerText = "📡";
            document.getElementById('transcript').innerText = "Listening...";

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('transcript').innerText = `"${text}"`;
                document.getElementById('mic-icon').innerText = "🎙️";
                // You can add logic here to auto-translate the text!
            };

            recognition.start();
        }

        // SOS Function
        function sendSOS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const message = encodeURIComponent(`HELP! My location is: https://maps.google.com/?q=${lat},${lng}`);
                    window.location.href = `whatsapp://send?text=${message}`;
                });
            }
        }
    </script>
</body>
</html>
