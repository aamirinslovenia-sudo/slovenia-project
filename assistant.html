<script>
    const transcriptDisplay = document.getElementById('transcript');
    const micIcon = document.getElementById('mic-icon');

    // 1. Voice Output (Phone speaks Slovenian)
    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'sl-SI'; 
        utterance.rate = 0.9; // Slightly slower for clarity
        window.speechSynthesis.speak(utterance);
    }

    // 2. The Universal Translator Logic
    async function startListening() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Please use Safari on iPhone for voice features.");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // It listens for English
        
        micIcon.innerText = "📡";
        transcriptDisplay.innerText = "Listening for English...";

        recognition.onresult = async (event) => {
            const englishText = event.results[0][0].transcript;
            transcriptDisplay.innerText = `English: "${englishText}"`;
            
            // Using a Free Translation API (LibreTranslate or similar)
            try {
                transcriptDisplay.innerText = "Translating...";
                const res = await fetch("https://libretranslate.de/translate", {
                    method: "POST",
                    body: JSON.stringify({
                        q: englishText,
                        source: "en",
                        target: "sl",
                        format: "text"
                    }),
                    headers: { "Content-Type": "application/json" }
                });

                const data = await res.json();
                const slovenianText = data.translatedText;
                
                // Show result and SPEAK IT
                transcriptDisplay.innerHTML = `<span class="text-blue-400">SLO:</span> ${slovenianText}`;
                speak(slovenianText);
                micIcon.innerText = "🎙️";
                
            } catch (error) {
                // Fallback: If the API is busy, we show a link
                transcriptDisplay.innerText = "Tap to view in Google Translate";
                window.open(`https://translate.google.com/?sl=en&tl=sl&text=${encodeURIComponent(englishText)}`, '_blank');
                micIcon.innerText = "🎙️";
            }
        };

        recognition.start();
    }

    function sendSOS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const message = encodeURIComponent(`Nujna pomoč! Moja lokacija: https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`);
                window.location.href = `whatsapp://send?text=${message}`;
            });
        }
    }
</script>
