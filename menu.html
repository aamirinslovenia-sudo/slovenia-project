<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luxe Digital Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .category-btn:active { transform: scale(0.95); background: #3b82f6; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <div id="special-banner" class="hidden bg-gradient-to-r from-orange-600 to-amber-500 p-4 text-center sticky top-0 z-[60]">
        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-orange-100 mb-1 italic">Special Offer</p>
        <h2 id="special-display-text" class="serif text-xl font-bold italic">Special Item Name</h2>
    </div>

    <div class="h-64 bg-[url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=1000')] bg-cover bg-center relative">
        <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a] via-transparent to-black/40"></div>
        <div class="absolute bottom-6 left-6">
            <h1 class="serif text-4xl font-bold italic tracking-tight">Maribor Luxe</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-70">Premium Coffee & Bistro</p>
        </div>
    </div>

    <div class="sticky top-0 z-50 glass p-4 flex gap-3 overflow-x-auto no-scrollbar">
        <button onclick="scrollToSection('coffee')" class="category-btn whitespace-nowrap px-6 py-2 rounded-full border border-white/10 text-xs font-bold uppercase transition-all">Coffee</button>
        <button onclick="scrollToSection('breakfast')" class="category-btn whitespace-nowrap px-6 py-2 rounded-full border border-white/10 text-xs font-bold uppercase transition-all">Breakfast</button>
        <button onclick="scrollToSection('drinks')" class="category-btn whitespace-nowrap px-6 py-2 rounded-full border border-white/10 text-xs font-bold uppercase transition-all">Drinks</button>
    </div>

    <div class="p-6 space-y-10">
        
        <section id="coffee">
            <h3 class="serif text-2xl mb-6 text-blue-400">Signature Coffee</h3>
            <div class="space-y-6">
                <div class="flex justify-between items-center border-b border-white/5 pb-4">
                    <div>
                        <h4 class="font-bold text-sm">Double Espresso</h4>
                        <p class="text-[10px] text-slate-500 mt-1">Dark roast, Arabica blend</p>
                    </div>
                    <span id="price-espresso" class="font-bold text-blue-500 text-lg">€2.80</span>
                </div>
                <div class="flex justify-between items-center border-b border-white/5 pb-4">
                    <div>
                        <h4 class="font-bold text-sm">Cappuccino Royale</h4>
                        <p class="text-[10px] text-slate-500 mt-1">Oat milk option available</p>
                    </div>
                    <span id="price-cappuccino" class="font-bold text-blue-500 text-lg">€3.50</span>
                </div>
            </div>
        </section>

        <section id="breakfast">
            <h3 class="serif text-2xl mb-6 text-blue-400">All Day Breakfast</h3>
            <div class="space-y-6">
                <div class="flex justify-between items-center border-b border-white/5 pb-4">
                    <div>
                        <h4 class="font-bold text-sm">Avocado Toast</h4>
                        <p class="text-[10px] text-slate-500 mt-1">Poached egg, sourdough bread</p>
                    </div>
                    <span id="price-avocado" class="font-bold text-blue-500 text-lg">€9.50</span>
                </div>
            </div>
        </section>

    </div>

    <div class="fixed bottom-6 left-0 right-0 px-6 z-[100]">
        <button onclick="callWaiter()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold shadow-2xl shadow-blue-500/40 active:scale-95 transition-all flex justify-center items-center gap-3 uppercase tracking-widest text-xs">
            <span class="text-lg">🛎️</span> CALL WAITER (TABLE 4)
        </button>
    </div>

    <script>
        // CONFIGURATION
        const WAITER_PHONE = "386XXXXXXXX"; // <-- Replace with the owner's WhatsApp number
        const TABLE_NUMBER = "4";

        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        // The WhatsApp Integration
        function callWaiter() {
            const message = encodeURIComponent(`🛎️ Hello! Table ${TABLE_NUMBER} needs assistance, please.`);
            const whatsappUrl = `https://wa.me/${WAITER_PHONE}?text=${message}`;
            
            // Open WhatsApp
            window.open(whatsappUrl, '_blank');
        }

        function loadData() {
            // Load Prices
            const items = ['espresso', 'cappuccino', 'avocado'];
            items.forEach(item => {
                const savedPrice = localStorage.getItem(item);
                if(savedPrice) {
                    document.getElementById('price-' + item).innerText = '€' + parseFloat(savedPrice).toFixed(2);
                }
            });

            // Load Special Offer Banner
            const isSpecialActive = localStorage.getItem('special_active') === 'true';
            const specialText = localStorage.getItem('special_text');
            const banner = document.getElementById('special-banner');
            
            if(isSpecialActive && specialText) {
                banner.classList.remove('hidden');
                document.getElementById('special-display-text').innerText = specialText;
            } else {
                banner.classList.add('hidden');
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
