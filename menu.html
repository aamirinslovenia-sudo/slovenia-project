<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luxe Digital Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .category-btn:active { transform: scale(0.95); background: #3b82f6; color: white; }
    </style>
</head>
<body class="pb-20">

    <div class="h-64 bg-[url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=1000')] bg-cover bg-center relative">
        <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a] via-transparent to-black/40"></div>
        <div class="absolute bottom-6 left-6">
            <h1 class="serif text-4xl font-bold italic tracking-tight">Maribor Luxe</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-70">Premium Coffee & Bistro</p>
        </div>
    </div>

    <div class="sticky top-0 z-50 glass p-4 flex gap-3 overflow-x-auto no-scrollbar">
        <button onclick="scrollToSection('coffee')" class="category-btn whitespace-nowrap px-6 py-2 rounded-full border border-white/10 text-xs font-bold uppercase">Coffee</button>
        <button onclick="scrollToSection('breakfast')" class="category-btn whitespace-nowrap px-6 py-2 rounded-full border border-white/10 text-xs font-bold uppercase">Breakfast</button>
        <button onclick="scrollToSection('drinks')" class="category-btn whitespace-nowrap px-6 py-2 rounded-full border border-white/10 text-xs font-bold uppercase">Drinks</button>
    </div>

    <div class="p-6 space-y-10">
        
        <section id="coffee">
            <h3 class="serif text-2xl mb-6 text-blue-400">Signature Coffee</h3>
            <div class="space-y-6">
                <div class="flex justify-between items-center border-b border-white/5 pb-4">
                    <div>
                        <h4 class="font-bold text-sm">Double Espresso</h4>
                        <p class="text-[10px] text-slate-500 mt-1">Dark roast, Arabica blend</p>
                    </div>
                    <span class="font-bold text-blue-500">€2.80</span>
                </div>
                <div class="flex justify-between items-center border-b border-white/5 pb-4">
                    <div>
                        <h4 class="font-bold text-sm">Cappuccino Royale</h4>
                        <p class="text-[10px] text-slate-500 mt-1">Oat milk option available</p>
                    </div>
                    <span class="font-bold text-blue-500">€3.50</span>
                </div>
            </div>
        </section>

        <section id="breakfast">
            <h3 class="serif text-2xl mb-6 text-blue-400">All Day Breakfast</h3>
            <div class="space-y-6">
                <div class="flex justify-between items-center border-b border-white/5 pb-4">
                    <div>
                        <h4 class="font-bold text-sm">Avocado Toast</h4>
                        <p class="text-[10px] text-slate-500 mt-1">Poached egg, sourdough bread</p>
                    </div>
                    <span class="font-bold text-blue-500">€9.50</span>
                </div>
            </div>
        </section>

    </div>

    <div class="fixed bottom-6 left-0 right-0 px-6">
        <button onclick="alert('Waiter has been notified to Table 4!')" class="w-full bg-blue-600 py-4 rounded-2xl font-bold shadow-2xl shadow-blue-500/20 active:scale-95 transition-all flex justify-center items-center gap-2">
            <span>🛎️</span> CALL WAITER
        </button>
    </div>

    <script>
        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
