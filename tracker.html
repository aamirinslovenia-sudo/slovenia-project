<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiteWatch GPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #0a0a0a; color: #fff; }
        .radar-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body class="p-6">

    <header class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-tighter text-blue-500 underline decoration-white">SITEWATCH <span class="text-white font-light">GPS</span></h1>
            <p class="text-[9px] uppercase tracking-widest text-slate-500">Auto-Logistics v1.0</p>
        </div>
        <div class="relative">
            <div class="absolute inset-0 bg-blue-500 rounded-full radar-pulse"></div>
            <div class="relative w-3 h-3 bg-blue-500 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.8)]"></div>
        </div>
    </header>

    <div id="status-card" class="bg-slate-900/50 border border-white/10 rounded-[30px] p-6 mb-6 text-center transition-all duration-500">
        <p class="text-[10px] uppercase font-bold text-slate-500 mb-2">Current Status</p>
        <h2 id="status-text" class="text-2xl font-bold text-yellow-500 italic">SCANNING LOCATION...</h2>
        <p id="site-name" class="text-xs text-slate-400 mt-2">Waiting for GPS signal</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
            <p class="text-[9px] text-slate-500 uppercase font-bold">Latitude</p>
            <p id="lat" class="text-sm font-mono text-blue-400">0.0000</p>
        </div>
        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
            <p class="text-[9px] text-slate-500 uppercase font-bold">Longitude</p>
            <p id="lng" class="text-sm font-mono text-blue-400">0.0000</p>
        </div>
    </div>

    <div class="bg-white/5 rounded-3xl p-6 border border-white/5">
        <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-4 text-center text-blue-500">Target Geofence</h3>
        <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-4">
            <span class="text-xs">Active Project:</span>
            <span class="text-xs font-bold text-white">Maribor Site A</span>
        </div>
        <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-4">
            <span class="text-xs">Target Zone:</span>
            <span class="text-xs font-bold text-white">200 Meters</span>
        </div>
        <div class="flex justify-between items-center">
            <span class="text-xs">Distance:</span>
            <span id="distance" class="text-xs font-bold text-yellow-500">Calculating...</span>
        </div>
    </div>

    <button onclick="getLocation()" class="w-full mt-10 bg-blue-600 py-4 rounded-2xl font-bold text-sm active:scale-95 transition-all shadow-lg shadow-blue-500/20">
        REFRESH SENSOR
    </button>

    <script>
        // Target Location (Example: Near Maribor Center)
        const targetLat = 46.5547; 
        const targetLng = 15.6459;
        const fenceRadius = 0.2; // 200 meters

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updatePosition, handleError, {
                    enableHighAccuracy: true
                });
            } else {
                alert("GPS not supported by this browser.");
            }
        }

        function updatePosition(position) {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;

            document.getElementById('lat').innerText = userLat.toFixed(4);
            document.getElementById('lng').innerText = userLng.toFixed(4);

            const dist = calculateDistance(userLat, userLng, targetLat, targetLng);
            document.getElementById('distance').innerText = dist.toFixed(2) + " km";

            const statusCard = document.getElementById('status-card');
            const statusText = document.getElementById('status-text');
            const siteName = document.getElementById('site-name');

            if (dist <= fenceRadius) {
                statusCard.style.background = "rgba(34, 197, 94, 0.2)";
                statusCard.style.borderColor = "rgba(34, 197, 94, 0.4)";
                statusText.innerText = "ON SITE ✅";
                statusText.className = "text-2xl font-bold text-green-500 italic";
                siteName.innerText = "Logged into Maribor Site A";
            } else {
                statusCard.style.background = "rgba(239, 68, 68, 0.1)";
                statusCard.style.borderColor = "rgba(239, 68, 68, 0.2)";
                statusText.innerText = "OFF SITE ❌";
                statusText.className = "text-2xl font-bold text-red-500 italic";
                siteName.innerText = "Outside project boundaries";
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radius of the earth in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function handleError(error) {
            console.warn(`ERROR(${error.code}): ${error.message}`);
        }

        // Auto-start
        getLocation();
    </script>
</body>
</html>
