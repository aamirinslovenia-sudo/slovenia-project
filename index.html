<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Management - MM Hidrotech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
        .batch-card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#0f172a] p-6 font-sans text-slate-200">

    <div id="login-screen" class="fixed inset-0 flex items-center justify-center p-6 z-[9999] bg-[#0f172a]">
        <div class="bg-[#1e293b] p-8 rounded-3xl border border-slate-700 shadow-2xl w-full max-sm text-center">
            <h2 class="text-2xl font-black text-white mb-2 uppercase">MM Hidrotech</h2>
            <p class="text-slate-400 text-sm mb-6">Enter Password to Access Database</p>
            <input type="password" id="pass-input" class="w-full bg-[#0f172a] border border-slate-700 p-4 rounded-xl text-white text-center mb-4 focus:border-blue-500 outline-none" placeholder="••••••••">
            <button onclick="checkPassword()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase tracking-widest hover:bg-blue-500 transition-all">Login</button>
            <p id="login-error" class="text-red-500 text-xs mt-4 hidden">Incorrect Password. Try again.</p>
        </div>
    </div>

    <div id="main-app" class="hidden max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-center bg-[#1e293b] p-8 rounded-2xl border border-slate-700 shadow-2xl gap-6">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tight uppercase">Slovenia Project</h1>
                <p class="text-blue-400 font-bold text-sm tracking-widest uppercase">MM HIDROTECH D.O.O. | MANPOWER DEPLOYMENT</p>
            </div>
            
            <div class="relative w-full md:w-80">
                <input type="text" id="searchInput" onkeyup="filterWorkers()" placeholder="Search worker name..." class="w-full bg-[#0f172a] border border-slate-700 p-4 pl-12 rounded-2xl text-sm focus:border-blue-500 outline-none transition-all">
                <span class="absolute left-4 top-4 text-xl opacity-30">🔍</span>
            </div>
        </header>

        <div id="batch-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <div id="workerModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-black opacity-80" onclick="toggleModal()"></div>
        <div class="modal-container bg-[#1e293b] w-11/12 md:max-w-md mx-auto rounded-3xl shadow-2xl z-50 border border-slate-700 max-h-[90vh] overflow-y-auto">
            <div class="modal-content py-6 text-left px-8">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex flex-col items-center flex-1 text-center">
                        <img id="m-photo" src="" class="w-28 h-28 rounded-full object-cover border-4 border-blue-500 shadow-lg mb-3">
                        <p class="text-2xl font-black text-white leading-tight" id="m-name"></p>
                        <div class="flex items-center justify-center gap-2 mt-1">
                             <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                             <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest" id="m-role-display"></p>
                        </div>
                    </div>
                    <button onclick="toggleModal()" class="text-3xl text-slate-500 hover:text-white leading-none">&times;</button>
                </div>
                
                <div class="space-y-3 text-sm bg-[#0f172a] p-5 rounded-2xl border border-slate-800">
                    <div class="flex justify-between items-center"><span class="text-slate-500 uppercase text-[10px] font-bold">Passport No</span> <span class="font-mono font-bold text-white text-base" id="m-passport"></span></div>
                    <div class="flex justify-between items-center border-t border-slate-800/50 pt-2">
                        <span class="text-slate-500 uppercase text-[10px] font-bold">Iran Visa Ref</span> 
                        <span id="m-visa-box" class="text-blue-400 font-bold"></span>
                    </div>
                    <div class="flex justify-between items-center border-t border-slate-800/50 pt-2"><span class="text-slate-500 font-bold text-blue-300">Fingerprint Date</span> <span class="text-blue-200 font-bold" id="m-finger"></span></div>
                    <div class="flex justify-between items-center border-t border-slate-800/50 pt-2"><span class="text-slate-500">Interview Date</span> <span class="text-slate-300" id="m-interview"></span></div>
                    <div class="flex justify-between items-center border-t border-slate-800/50 pt-2"><span class="text-slate-500 uppercase text-[10px] font-bold text-emerald-400">Pakistan Entry</span> <span class="text-emerald-400 font-black text-lg" id="m-entry"></span></div>
                </div>

                <div class="mt-6 flex flex-col gap-3">
                    <a id="m-whatsapp" href="#" target="_blank" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black text-center text-xs uppercase tracking-widest shadow-lg shadow-emerald-900/20">WhatsApp Worker</a>
                    <button onclick="toggleModal()" class="w-full bg-slate-700 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest">Return to Dashboard</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkPassword() {
            if(document.getElementById('pass-input').value === "MM2026") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        const workerData = [
            { batch: "1st Batch", name: "Shahriyar Khan", role: "Multi Welder", phone: "920000000000", passport: "KH4148432", visa: "IR-10310080212", visaLink: "shahriyar.pdf", photo: "shahriyar.jpeg", finger: "16-11-2025", interview: "N/A", entry: "20-11-2025" },
            { batch: "1st Batch", name: "Muhammad Ali Rashid", role: "Multi Welder", phone: "920000000000", passport: "KC9847072", visa: "IR-10310080211", visaLink: "ali_rashid.pdf", photo: "ali_rashid.jpeg", finger: "16-11-2025", interview: "N/A", entry: "20-11-2025" },
            { batch: "1st Batch", name: "Hamid Naeem", role: "Multi Welder", phone: "920000000000", passport: "DK9959992", visa: "IR-10310080213", visaLink: "hamid.pdf", photo: "hamid.jpeg", finger: "16-11-2025", interview: "17-08-2026", entry: "20-11-2025" },
            { batch: "1st Batch", name: "Mhammad Faizan Ali Shah", role: "Multi Welder", phone: "920000000000", passport: "YD5151181", visa: "IR-10310080214", visaLink: "faizan.pdf", photo: "faizan.jpeg", finger: "16-11-2025", interview: "N/A", entry: "20-11-2025" },
            { batch: "1st Batch", name: "Muhammad Uzair", role: "Multi Welder", phone: "920000000000", passport: "AB2899693", visa: "IR-10310080210", visaLink: "uzair.pdf", photo: "uzair.jpeg", finger: "16-11-2025", interview: "N/A", entry: "20-11-2025" },
            { batch: "2nd Batch", name: "Sajjad Khan", role: "Multi Welder", phone: "920000000000", passport: "MC4100303", visa: "IR-10310084591", visaLink: "sajjad_k.pdf", photo: "", finger: "12-01-2026", interview: "N/A", entry: "15-01-2026" },
            { batch: "2nd Batch", name: "Asim Amin", role: "Multi Welder", phone: "920000000000", passport: "BX1205984", visa: "IR-10310084593", visaLink: "asim.pdf", photo: "", finger: "12-01-2026", interview: "28-06-2026", entry: "15-01-2026" },
            { batch: "2nd Batch", name: "Muhammad Safeer", role: "Multi Welder", phone: "920000000000", passport: "BH5529073", visa: "IR-10310084592", visaLink: "safeer.pdf", photo: "", finger: "12-01-2026", interview: "N/A", entry: "15-01-2026" },
            { batch: "2nd Batch", name: "Muhammad Sulaman", role: "Multi Welder", phone: "920000000000", passport: "BB5756615", visa: "Pending", visaLink: "#", photo: "", finger: "TBD", interview: "04-05-2026", entry: "TBD" },
            { batch: "3rd Batch", name: "Muhammad Nasir Jamil", role: "Engineer", phone: "920000000000", passport: "TBD", visa: "Pending", visaLink: "#", photo: "", finger: "TBD", interview: "TBD", entry: "TBD" },
            { batch: "3rd Batch", name: "Asad Sajjad", role: "Multi Welder", phone: "920000000000", passport: "TBD", visa: "Pending", visaLink: "#", photo: "", finger: "TBD", interview: "TBD", entry: "TBD" },
            { batch: "3rd Batch", name: "Sajjad Ali", role: "Multi Welder", phone: "920000000000", passport: "TBD", visa: "Pending", visaLink: "#", photo: "", finger: "TBD", interview: "TBD", entry: "TBD" },
            { batch: "3rd Batch", name: "Imran Akram", role: "Multi Welder", phone: "920000000000", passport: "TBD", visa: "Pending", visaLink: "#", photo: "", finger: "TBD", interview: "TBD", entry: "TBD" },
            { batch: "3rd Batch", name: "Muhammad Zohaib", role: "Pipefitter", phone: "920000000000", passport: "TBD", visa: "Pending", visaLink: "#", photo: "", finger: "TBD", interview: "TBD", entry: "TBD" },
            { batch: "4th Batch", name: "Muhammad Maaz", role: "Multi Welder", phone: "920000000000", passport: "TBD", visa: "Pending", visaLink: "#", photo: "", finger: "TBD", interview: "TBD", entry: "TBD" },
            { batch: "4th Batch", name: "Muhammad Mansoor", role: "Multi Welder", phone: "920000000000", passport: "TBD", visa: "Pending", visaLink: "#", photo: "", finger: "TBD", interview: "TBD", entry: "TBD" },
            { batch: "5th Batch", name: "Zaheer Ahmad", role: "Multi Welder", phone: "920000000000", passport: "TBD", visa: "Pending", visaLink: "#", photo: "", finger: "TBD", interview: "TBD", entry: "TBD" },
            { batch: "5th Batch", name: "Muhammad Qaiser", role: "Multi Welder", phone: "920000000000", passport: "TBD", visa: "Pending", visaLink: "#", photo: "", finger: "TBD", interview: "TBD", entry: "TBD" }
        ];

        function toggleModal(workerIndex = null) {
            const modal = document.getElementById('workerModal');
            if (workerIndex !== null) {
                const w = workerData[workerIndex];
                document.getElementById('m-name').innerText = w.name;
                document.getElementById('m-role-display').innerText = w.role;
                document.getElementById('m-passport').innerText = w.passport || "TBD";
                document.getElementById('m-finger').innerText = w.finger || "TBD";
                document.getElementById('m-interview').innerText = w.interview || "TBD";
                document.getElementById('m-entry').innerText = w.entry || "TBD";
                document.getElementById('m-photo').src = w.photo ? (w.photo + "?t=" + new Date().getTime()) : ('https://ui-avatars.com/api/?name=' + encodeURIComponent(w.name) + '&background=334155&color=fff');
                document.getElementById('m-whatsapp').href = "https://wa.me/" + w.phone;
                
                const visaBox = document.getElementById('m-visa-box');
                if (w.visa !== "Pending" && w.visaLink !== "#") {
                    visaBox.innerHTML = `<a href="${w.visaLink}" target="_blank" class="underline hover:text-white cursor-pointer">${w.visa} 📄</a>`;
                } else {
                    visaBox.innerText = w.visa;
                }
            }
            modal.classList.toggle('opacity-0');
            modal.classList.toggle('pointer-events-none');
        }

        function filterWorkers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.worker-item').forEach(item => {
                const name = item.getAttribute('data-name').toLowerCase();
                item.style.display = name.includes(query) ? 'flex' : 'none';
            });
        }

        const grid = document.getElementById('batch-grid');
        const batches = workerData.reduce((acc, w) => { (acc[w.batch] = acc[w.batch] || []).push(w); return acc; }, {});

        Object.entries(batches).forEach(([batchName, members]) => {
            const block = document.createElement('div');
            block.className = "batch-card rounded-2xl overflow-hidden mb-8";
            const listItems = members.map((m) => {
                const idx = workerData.findIndex(w => w.name === m.name);
                let sText = "Process";
                let sClass = "border-amber-500/50 text-amber-500 bg-amber-500/10";
                
                if (m.finger !== "TBD" && m.finger !== "N/A" && m.interview !== "TBD" && m.interview !== "N/A") {
                    sText = "Finger Done / Int. Wait";
                    sClass = "border-emerald-500/50 text-emerald-400 bg-emerald-500/10";
                } else if (m.finger !== "TBD" && m.finger !== "N/A") {
                    sText = "Fingerprint Done";
                    sClass = "border-blue-500/50 text-blue-400 bg-blue-500/10";
                } else if (m.interview !== "TBD" && m.interview !== "N/A") {
                    sText = "Interview Waiting";
                    sClass = "border-purple-500/50 text-purple-400 bg-purple-500/10";
                }

                return `<div onclick="toggleModal(${idx})" data-name="${m.name}" class="worker-item flex justify-between items-center p-5 border-b border-slate-700/50 last:border-0 hover:bg-slate-700/40 cursor-pointer transition-all">
                    <div><span class="text-white font-bold">${m.name}</span><p class="text-[10px] text-blue-400 font-bold uppercase mt-1 tracking-widest">${m.role}</p></div>
                    <span class="px-2 py-1 text-[8px] font-black rounded border ${sClass} uppercase tracking-tighter">${sText}</span>
                </div>`;
            }).join('');
            block.innerHTML = `<div class="bg-slate-800/80 px-5 py-4 border-b border-slate-700"><h2 class="font-black text-blue-400 text-xs uppercase tracking-widest">${batchName}</h2></div><div>${listItems}</div>`;
            grid.appendChild(block);
        });
    </script>
</body>
</html>
