<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        var password = prompt("Please enter the access password:");
        if (password !== "MMH2026") { 
            alert("Incorrect password. Access denied.");
            document.documentElement.innerHTML = "<body style='background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;'><h1>🚫 Unauthorized Access</h1></body>";
            window.stop();
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Management - MM Hidrotech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
        .batch-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #3b82f6; margin-bottom: 15px; background: #334155; }
    </style>
</head>
<body class="bg-[#0f172a] p-6 font-sans text-slate-200">

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex justify-between items-center bg-[#1e293b] p-8 rounded-2xl border border-slate-700 shadow-2xl">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tight uppercase">Slovenia Project</h1>
                <p class="text-blue-400 font-bold text-sm tracking-widest">MM HIDROTECH D.O.O. | MANPOWER DEPLOYMENT</p>
            </div>
            <div class="text-right border-l border-slate-700 pl-8">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active Database</span>
                <p class="text-3xl font-black text-white">18 <span class="text-sm font-light text-slate-400">Workers</span></p>
            </div>
        </header>

        <div id="batch-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <div id="workerModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-black opacity-80" onclick="toggleModal()"></div>
        <div class="modal-container bg-[#1e293b] w-11/12 md:max-w-md mx-auto rounded-3xl shadow-2xl z-50 overflow-y-auto border border-slate-700">
            <div class="modal-content py-8 text-left px-10">
                <div class="flex flex-col items-center pb-6">
                    <img id="m-photo" src="" class="profile-img" alt="Worker Photo">
                    <p class="text-3xl font-black text-white text-center" id="m-name"></p>
                    <div class="flex items-center gap-2 mt-1">
                         <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                         <p class="text-xs font-bold text-blue-400 uppercase tracking-widest" id="m-batch"></p>
                    </div>
                </div>
                
                <div class="space-y-4 text-sm bg-[#0f172a] p-6 rounded-2xl border border-slate-800">
                    <div class="flex justify-between"><span class="text-slate-500 uppercase text-[10px] font-bold">Passport No</span> <span class="font-mono font-bold text-white text-base" id="m-passport"></span></div>
                    <div class="flex justify-between border-t border-slate-800 pt-3"><span class="text-slate-500">Date of Birth</span> <span class="text-slate-300" id="m-dob"></span></div>
                    <div class="flex justify-between border-t border-slate-800 pt-3">
                        <span class="text-slate-500 uppercase text-[10px] font-bold">Iran Visa Ref</span> 
                        <span id="m-visa" class="text-blue-400 font-bold"></span>
                    </div>
                    <div class="flex justify-between border-t border-slate-800 pt-3"><span class="text-slate-500 font-bold text-blue-300">Fingerprint Date</span> <span class="text-blue-200 font-bold" id="m-finger"></span></div>
                    <div class="flex justify-between border-t border-slate-800 pt-3 items-center">
                        <span class="text-slate-500 uppercase text-[10px] font-bold">Pakistan Entry</span> 
                        <span class="text-emerald-400 font-black text-lg" id="m-entry"></span>
                    </div>
                </div>

                <div class="flex justify-end pt-8">
                    <button onclick="toggleModal()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-blue-900/40 hover:bg-blue-500 transition-all active:scale-95">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const workerData = [
            { batch: "1st Batch", name: "Shahriyar Khan", passport: "KH4148432", dob: "19-02-1996", visa: "IR-10310080212", visaLink: "shahriyar.pdf", photo: "shahriyar.jpeg", finger: "16-11-2025", entry: "20-11-2025" },
            { batch: "1st Batch", name: "Muhammad Ali Rashid", passport: "KC9847072", dob: "14-07-2002", visa: "IR-10310080211", visaLink: "ali_rashid.pdf", photo: "", finger: "16-11-2025", entry: "20-11-2025" },
            { batch: "2nd Batch", name: "Sajjad Khan", passport: "MC4100303", dob: "29-11-1987", visa: "IR-10310084591", visaLink: "sajjad_k.pdf", photo: "", finger: "12-01-2026", entry: "15-01-2026" }
            // Add more workers following the same pattern
        ];

        function toggleModal(workerIndex = null) {
            const modal = document.getElementById('workerModal');
            const body = document.querySelector('body');
            
            if (workerIndex !== null) {
                const w = workerData[workerIndex];
                document.getElementById('m-name').innerText = w.name;
                document.getElementById('m-batch').innerText = w.batch;
                document.getElementById('m-passport').innerText = w.passport;
                document.getElementById('m-dob').innerText = w.dob;
                document.getElementById('m-finger').innerText = w.finger;
                document.getElementById('m-entry').innerText = w.entry;
                
                // Handle Photo
                const photoEl = document.getElementById('m-photo');
                photoEl.src = w.photo || 'https://via.placeholder.com/100?text=No+Photo';

                const visaBox = document.getElementById('m-visa');
                visaBox.innerHTML = w.visaLink !== "#" ? `<a href="${w.visaLink}" target="_blank" class="underline">${w.visa} 📄</a>` : w.visa;
            }

            modal.classList.toggle('opacity-0');
            modal.classList.toggle('pointer-events-none');
            body.classList.toggle('modal-active');
        }

        // Logic to build the grid (same as before)
        const batches = workerData.reduce((acc, worker) => {
            acc[worker.batch] = acc[worker.batch] || [];
            acc[worker.batch].push(worker);
            return acc;
        }, {});

        const grid = document.getElementById('batch-grid');
        Object.entries(batches).forEach(([batchName, members]) => {
            const block = document.createElement('div');
            block.className = "batch-card rounded-2xl overflow-hidden shadow-2xl";
            const listItems = members.map((m) => {
                const idx = workerData.findIndex(w => w.name === m.name);
                return `<div onclick="toggleModal(${idx})" class="p-5 border-b border-slate-700/50 hover:bg-slate-700/40 cursor-pointer text-white font-bold">${m.name}</div>`;
            }).join('');
            block.innerHTML = `<div class="bg-slate-800/80 px-5 py-4 text-blue-400 font-black uppercase text-xs">${batchName}</div><div>${listItems}</div>`;
            grid.appendChild(block);
        });
    </script>
</body>
</html>
