<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .input-field { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; width: 100%; margin-top: 8px; color: white; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-blue-500">Menu Controller</h1>
            <p class="text-xs text-slate-400 uppercase tracking-widest">Update Prices & Items</p>
        </header>

        <div class="bg-slate-900 p-6 rounded-3xl border border-white/5 mb-6">
            <label class="text-xs font-bold text-slate-500 uppercase">Select Item</label>
            <select id="item-select" class="input-field mb-4">
                <option value="espresso">Double Espresso</option>
                <option value="cappuccino">Cappuccino Royale</option>
                <option value="avocado">Avocado Toast</option>
            </select>

            <label class="text-xs font-bold text-slate-500 uppercase">New Price (€)</label>
            <input type="number" id="new-price" step="0.10" placeholder="e.g. 3.00" class="input-field mb-6">

            <button onclick="updatePrice()" class="w-full bg-blue-600 py-4 rounded-xl font-bold active:scale-95 transition-all">
                UPDATE LIVE MENU
            </button>
        </div>

        <p id="status" class="text-center text-green-500 font-bold text-sm hidden">✓ Menu Updated Successfully!</p>
    </div>

    <script>
        function updatePrice() {
            const item = document.getElementById('item-select').value;
            const price = document.getElementById('new-price').value;

            if(!price) { alert("Please enter a price"); return; }

            // Save to LocalStorage
            localStorage.setItem(item, price);

            // Show Success
            const status = document.getElementById('status');
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
