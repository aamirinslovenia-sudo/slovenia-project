<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Ambient</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; touch-action: none; }
        #canvas { width: 100vw; height: 100vh; transition: background 0.5s ease; }
        .ui { position: absolute; bottom: 40px; left: 0; width: 100%; text-align: center; pointer-events: none; }
        .label { font-family: sans-serif; font-size: 10px; letter-spacing: 5px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
    </style>
</head>
<body onclick="toggleParty()">

    <div id="canvas"></div>

    <div class="ui">
        <p class="label" id="instruction">Slide to change vibe</p>
        <p class="label mt-2" id="vibe-name">Calm</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const vibeName = document.getElementById('vibe-name');
        let partyMode = false;
        let partyInterval;

        // Change color based on touch/mouse position
        window.addEventListener('pointermove', (e) => {
            if (partyMode) return;
            
            const hue = (e.clientX / window.innerWidth) * 360;
            const saturation = 70 + (e.clientY / window.innerHeight) * 30;
            const lightness = 20 + (e.clientY / window.innerHeight) * 30;
            
            canvas.style.background = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
            
            // Update Vibe Name based on Hue
            if (hue < 30) vibeName.innerText = "Energy";
            else if (hue < 90) vibeName.innerText = "Focus";
            else if (hue < 160) vibeName.innerText = "Nature";
            else if (hue < 220) vibeName.innerText = "Ocean";
            else if (hue < 300) vibeName.innerText = "Deep Sleep";
            else vibeName.innerText = "Passion";
        });

        function toggleParty() {
            partyMode = !partyMode;
            const instruction = document.getElementById('instruction');
            
            if (partyMode) {
                instruction.innerText = "PARTY MODE ACTIVE";
                partyInterval = setInterval(() => {
                    canvas.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                }, 100);
            } else {
                instruction.innerText = "Slide to change vibe";
                clearInterval(partyInterval);
                canvas.style.background = '#000';
            }
        }
    </script>
</body>
</html>
